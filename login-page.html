<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill | Login Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="shortcut icon" href="asset/movie-open.png" type="image/x-icon" />
  </head>
  <body>
    <main>
      <section class="card">
        <div class="chill-logo">
          <img src="asset/Logo.png" alt="Chill Logo" />
        </div>
        <h1>Masuk</h1>
        <p>Selamat datang kembali!</p>
        <form action="/login" method="post">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              placeholder="Masukkan username"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Masukkan password"
            />
          </div>
          <section class="question-login">
            <p>
              Belum punya akun? <a href="register-page.html">Daftar di sini</a>.
            </p>
            <p><a href="/forgot-password">Lupa password?</a></p>
          </section>

          <button class="button-login" type="submit">Login</button>
          <p>Atau</p>

          <div class="google-login">
            <img src="asset/google.png" alt="Google icon" />
            <a href="#">Masuk dengan Google</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
