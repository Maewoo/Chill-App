<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill | Register Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="card">
        <logo class="chill-logo">
          <img src="asset/Logo.png" alt="Chill Logo" />
        </logo>
        <h1>Daftar</h1>
        <p>Selamat datang di Chill!</p>
        <form action="/login" method="post">
          <label for="username">Username:</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Masukkan username"
            required
          />
          <label for="password">Password:</label>

          <input
            type="password"
            id="password"
            name="password"
            placeholder="Masukkan password"
            required
          />
          <label for="confirm-password">Konfirmasi Password:</label>
          <br />
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Konfirmasi password"
            required
          />
          <section class="question-login">
            <p>
              Sudah punya akun? <a href="login-page.html">Masuk di sini</a>.
            </p>
          </section>

          <button class="button-login" type="submit">Daftar</button>
          <p>Atau</p>
          <button class="button-google">Daftar dengan Google</button>
        </form>
      </section>
    </main>
  </body>
</html>
